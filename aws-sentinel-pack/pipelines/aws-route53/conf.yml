output: default
streamtags: []
groups: {}
asyncFuncTimeout: 1000
functions:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Step 1: Comment вҖ” Pipeline overview
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        AWS Route53 Resolver Query Logs вҶ’ Microsoft Sentinel (AWSRoute53Resolver table).
        Transforms Route53 Resolver JSON query logs into the native AWSRoute53Resolver
        schema for ingestion via the Azure Monitor Logs Ingestion API (DCR).
        Route53 logs use snake_case field names mapped to PascalCase Sentinel columns.
        The answers array and srcids object map to dynamic columns.
        Schema ref: https://learn.microsoft.com/en-us/azure/azure-monitor/reference/tables/awsroute53resolver

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Step 2: Parse вҖ” Extract JSON from _raw if not already parsed
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: serde
    filter: "true"
    disabled: false
    conf:
      mode: extract
      type: json
      srcField: _raw

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Step 3: Eval вҖ” Map Route53 fields to Sentinel AWSRoute53Resolver schema
  # AWS uses snake_case; Sentinel uses PascalCase.
  # query_timestamp is already ISO 8601 format.
  # answers array and srcids object вҶ’ dynamic columns.
  # SrcPort is string type in Sentinel (not int).
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: eval
    filter: "true"
    disabled: false
    conf:
      add:
        # в”Җв”Җ TimeGenerated (mandatory) вҖ” from query_timestamp в”Җв”Җ
        - name: TimeGenerated
          value: "query_timestamp ? new Date(query_timestamp).toISOString() : new Date().toISOString()"

        # в”Җв”Җ String fields (snake_case вҶ’ PascalCase) в”Җв”Җ
        - name: Version
          value: "version || undefined"
        - name: AccountId
          value: "account_id || undefined"
        - name: Region
          value: "region || undefined"
        - name: VpcId
          value: "vpc_id || undefined"
        - name: QueryName
          value: "query_name || undefined"
        - name: QueryType
          value: "query_type || undefined"
        - name: QueryClass
          value: "query_class || undefined"
        - name: Rcode
          value: "rcode || undefined"
        - name: SrcAddr
          value: "srcaddr || undefined"
        - name: SrcPort
          value: "srcport != null ? String(srcport) : undefined"
        - name: Transport
          value: "transport || undefined"
        - name: LogType
          value: "'Resolver"

        # в”Җв”Җ DNS Firewall fields в”Җв”Җ
        - name: FirewallRuleGroupId
          value: "firewall_rule_group_id || undefined"
        - name: FirewallRuleAction
          value: "firewall_rule_action || undefined"
        - name: FirewallDomainListId
          value: "firewall_domain_list_id || undefined"

        # в”Җв”Җ Dynamic fields (arrays/objects вҶ’ JSON) в”Җв”Җ
        - name: Answers
          value: "answers ? JSON.stringify(answers) : undefined"
        - name: SrcIds
          value: "srcids ? JSON.stringify(srcids) : undefined"

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Step 4: Eval (cleanup) вҶ’ Remove original/unmapped fields
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: eval
    filter: "true"
    disabled: false
    conf:
      remove:
        - version
        - account_id
        - region
        - vpc_id
        - query_timestamp
        - query_name
        - query_type
        - query_class
        - rcode
        - answers
        - srcaddr
        - srcport
        - transport
        - srcids
        - firewall_rule_group_id
        - firewall_rule_action
        - firewall_domain_list_id
        - additional_properties
        - is_delayed
        - _raw
        - _time
        - cribl_*
        - __inputId
        - __outputId
        - source
        - sourcetype
        - host
        - index
        - _path
        - cribl_pipe

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Step 5: Serialize вҶ’ Output as JSON for the Logs Ingestion API
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ(ҖҖҙҒҘҗиҒН•Й‘”(ҖҖҖҒҷҘұС•ИиҖүСЙХ”Ҳ(ҖҖҖҒ‘ҘН…үұ•җиҒҷ…ұН”(ҖҖҖҒҚҪ№ҳи(ҖҖҖҖҖҒөҪ‘”иҒЙ•Н•ЙҘ…ұҘй”(ҖҖҖҖҖҒСеБ”иҒ©НҪё(ҖҖҖҖҖҒНЙҚҘ•ұҗиҒ}Й…Ь(ҖҖҖҖҖҒҷҘ•ұ‘ҘұС•ЙбБИиҖҲ„Ҫy|ҪӨ№С•НРЎҷҘ•ұ‘9…ө”ӨҖҳҳҖ„ҪyҚЙҘүұ|ҪӨ№С•НРЎҷҘ•ұ‘9…ө”ӨҲ(